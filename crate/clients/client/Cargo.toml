[package]
name = "cosmian_kms_client"
version.workspace = true
authors.workspace = true
categories.workspace = true
edition.workspace = true
keywords.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "Cosmian KMS REST Client"

[lints]
workspace = true

[lib]
# doc test linking as a separate binary is extremely slow
# and is not needed for internal lib
doctest = false

[features]
non-fips = ["cosmian_kms_client_utils/non-fips"]

[dependencies]
actix-web = { workspace = true, features = ["macros"] }
cosmian_crypto_core = { workspace = true }
cosmian_kms_client_utils = { path = "../client_utils", version = "5.21.0" }
cosmian_logger = { workspace = true }
der = { workspace = true, features = ["std"] }
oauth2 = { version = "5.0", features = ["reqwest"], default-features = false }
pem = { workspace = true }
reqwest = { workspace = true, features = [
  "json",
  "native-tls",
  "socks",
  "http2",
] }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["rt"] }
tracing = { workspace = true }
url = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = [
  "rt",
  "rt-multi-thread",
  "macros",
  "time",
] }
toml = { workspace = true }
