# KMS secrets file — store sensitive values here, away from the main config.
#
# This file should be:
#   - owned by root (or the KMS service account)
#   - mode 400 (read only by owner)
#   - NOT shared with ops or integration teams
#
# Reference this file from the main kms.toml:
#   secrets_file = "/etc/cosmian/secrets.toml"
# or set the COSMIAN_KMS_SECRETS_CONF environment variable.
#
# Values in this file are deep-merged over the main config at startup.
# Any string value can also use ${VAR_NAME} env var interpolation.

[db]
# PostgreSQL or MySQL connection string including the password:
# database_url = "postgresql://kms:${KMS_DB_PASSWORD}@db.internal/kms"
# Or via a secret URI backend (requires secret-vault / secret-aws / secret-azure feature):
# database_url = "vault://secret/kms/db#url"
# database_url = "aws-ssm://eu-west-1//kms/prod/db-url"
# database_url = "azure-kv://my-vault/secrets/kms-db-url"

# Redis-findex master password (non-FIPS only):
# redis_master_password = "${KMS_REDIS_MASTER_PASSWORD}"

[tls]
# PKCS#12 bundle password (non-FIPS only):
# tls_p12_password = "${KMS_TLS_P12_PASSWORD}"
# tls_p12_password = "vault://secret/kms/tls#p12_password"

# HSM slot passwords — list must match the hsm_slot list in the main config.
# hsm_password = ["${KMS_HSM_SLOT1_PASSWORD}", "${KMS_HSM_SLOT2_PASSWORD}"]
# hsm_password = ["vault://secret/kms/hsm-slot1", "vault://secret/kms/hsm-slot2"]

[http]
# API authentication token:
# api_token_id = "${KMS_API_TOKEN}"
