default_username = "admin"

# Specifies which KMIP object types should be automatically unwrapped when retrieved.
# Repeat this option to specify multiple object types.
# Allowed values: All, Certificate, CertificateRequest, OpaqueObject, PGPKey, PrivateKey, PublicKey, SecretData, SplitKey, SymmetricKey
# Example:
## default_unwrap_type = ["SecretData", "SymmetricKey"]

# ── Multi-HSM configuration ───────────────────────────────────────────────────
# To connect multiple HSMs simultaneously, declare one [[hsm_instances]] section
# per device.  The first entry gets the routing prefix "hsm::<model>", the second
# "hsm::<model>" (or "hsm::<model>_1" if same model), etc.
# Object UIDs take the form "hsm::<model>::<slot>::<key>".
#
## [[hsm_instances]]
## hsm_model    = "softhsm2"           # softhsm2 | utimaco | proteccio | crypt2pay | smartcardhsm | other
## hsm_admin    = ["tech@example.com"] # KMS users with admin rights on this HSM
## hsm_slot     = [0]                  # PKCS#11 slot indices
## hsm_password = ["changeme"]         # Login passwords (same order as hsm_slot)
#
# UIDs for the above: hsm::softhsm2::0::<key_id>
#
## [[hsm_instances]]
## hsm_model    = "utimaco"
## hsm_admin    = ["tech@example.com"]
## hsm_slot     = [0, 1]
## hsm_password = ["slot0pass", "slot1pass"]
#
# UIDs for the above: hsm::utimaco::0::<key_id>, hsm::utimaco::1::<key_id>

[http]
port = 9998
hostname = "0.0.0.0"

[db]
database_type = "redis-findex"
database_url = "redis://0.0.0.0:6379"
redis_master_password = "master-password"
