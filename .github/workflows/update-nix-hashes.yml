---
# Reusable workflow: recompute all Nix vendor hashes on both Linux and macOS
# and commit any changed files back to the target branch.
#
# Called by:
#   - release.yml  — after version bump, before triggering packaging
#   - pr.yml       — before packaging, to auto-fix hash mismatches in PRs
#
# The two matrix runners (ubuntu-latest and macos-15) touch disjoint hash
# files so they can commit concurrently without conflicts.  Each job pulls
# the latest HEAD before pushing.
name: Update Nix vendor hashes

on:
  workflow_call:
    inputs:
      branch:
        description: Branch to check out and push updated hashes to
        required: true
        type: string
      commit_message:
        description: Commit message (runner OS is appended automatically)
        required: false
        type: string
        default: 'build: update Nix vendor hashes'
    secrets:
      PAT_TOKEN:
        required: true

jobs:
  update-nix-hashes:
    name: Update Nix vendor hashes (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-latest, macos-15]

    steps:
      - name: Nix installation
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            connect-timeout = 15
            stalled-download-timeout = 15
            narinfo-cache-negative-ttl = 0

      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.PAT_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Warm Nix store
        run: |
          sed -n 's/.*url *= *"\(https:\/\/[^"]*\.tar\.gz\)".*/\1/p' default.nix | sort -u \
          | while read -r url; do
            dest="/tmp/$(basename "$url")"
            fallback=$(echo "$url" | sed \
              's|https://package.cosmian.com/nixpkgs/|https://github.com/NixOS/nixpkgs/archive/|')
            echo "Downloading $(basename "$url") …"
            if ! curl --retry 3 --retry-delay 5 --retry-all-errors -fsSL -o "$dest" "$url"; then
              echo "Mirror failed, falling back to GitHub …"
              curl --retry 5 --retry-delay 10 --retry-max-time 300 \
                   --retry-all-errors -fsSL -o "$dest" "$fallback"
            fi
            echo "Injecting into Nix store …"
            nix-prefetch-url --unpack --name source "file://$dest"
            rm -f "$dest"
          done

      - name: Recompute all Nix vendor hashes
        run: bash .github/scripts/release/nix_build_update_hash.sh

      - name: Commit updated Nix hashes
        run: |
          git add nix/expected-hashes/
          if git diff --cached --quiet; then
            echo "Nix hashes are already up-to-date, nothing to commit."
          else
            git commit -m "${{ inputs.commit_message }} (${{ runner.os }})"
            # Pull after committing to avoid "index contains uncommitted changes"
            # error. The two platform jobs touch disjoint file sets so rebase
            # always succeeds cleanly.
            git pull --rebase origin "${{ inputs.branch }}"
            git push origin "${{ inputs.branch }}"
          fi
