---
name: Build all

on:
  workflow_call:
    inputs:
      toolchain:
        required: true
        type: string
  workflow_dispatch:

jobs:
  test-nix:
    name: Test on ${{ matrix.type }} - ${{ matrix.features }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        type:
          - sqlite
          - mysql
          - percona
          - mariadb
          - psql
          - otel_export
          - google_cse
          - redis
          - pykmip
          - wasm
          - aws_xks
          - azure_ekm
          - ui
          - gcp_cmek
          - openssh
          - luks
          - secret_vault
          - secret_aws
          - secret_azure
        features: [ fips, non-fips ]
        exclude:
          # redis is exclusively for non-fips
          - type: redis
            features: fips
          # pykmip is exclusively for non-fips since P12 is used for TLS KMS server
          - type: pykmip
            features: fips
          # aws_xks relies on curl SigV4 + non-FIPS build flags
          - type: aws_xks
            features: fips
          # azure_ekm is only run with non-fips
          - type: azure_ekm
            features: fips
          # openssh PKCS#11 tests force non-fips (EdDSA / full algorithm set)
          - type: openssh
            features: fips
          # luks disk-encryption PKCS#11 tests force non-fips
          - type: luks
            features: fips
          # secret backends use reqwest/aws-sdk which are non-fips optional features
          - type: secret_vault
            features: fips
          - type: secret_aws
            features: fips
          - type: secret_azure
            features: fips

    steps:
      - name: Nix installation
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            connect-timeout = 15
            stalled-download-timeout = 15
            narinfo-cache-negative-ttl = 0

      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Warm Nix store
        run: |
          sed -n 's/.*url *= *"\(https:\/\/[^"]*\.tar\.gz\)".*/\1/p' default.nix | sort -u | while read -r url; do
            dest="/tmp/$(basename "$url")"
            # Build GitHub fallback URL from mirror URL
            fallback=$(echo "$url" | sed 's|https://package.cosmian.com/nixpkgs/|https://github.com/NixOS/nixpkgs/archive/|')
            echo "Downloading $(basename "$url") …"
            if ! curl --retry 3 --retry-delay 5 --retry-all-errors -fsSL -o "$dest" "$url"; then
              echo "Mirror failed, falling back to GitHub …"
              curl --retry 5 --retry-delay 10 --retry-max-time 300 --retry-all-errors -fsSL -o "$dest" "$fallback"
            fi
            echo "Injecting into Nix store …"
            nix-prefetch-url --unpack --name source "file://$dest"
            rm -f "$dest"
          done

      - name: Run docker containers
        run: |
          docker compose -h
          docker compose up -d

      - name: Test
        env:
          POSTGRES_USER: kms
          PGUSER: kms
          POSTGRES_PASSWORD: kms
          POSTGRES_DB: kms
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          KMS_POSTGRES_URL: postgresql://kms:kms@127.0.0.1:5432/kms

          MYSQL_DATABASE: kms
          MYSQL_ROOT_PASSWORD: kms
          MYSQL_HOST: localhost
          MYSQL_PORT: 3306
          KMS_MYSQL_URL: mysql://root:kms@localhost:3306/kms

          PERCONA_HOST: localhost
          PERCONA_PORT: 3307
          KMS_PERCONA_URL: mysql://root:kms@localhost:3307/kms

          MARIADB_HOST: localhost
          MARIADB_PORT: 3308
          KMS_MARIADB_URL: mysql://root:kms@localhost:3308/kms

          KMS_SQLITE_PATH: data/shared

          REDIS_HOST: localhost
          REDIS_PORT: 6379
          KMS_REDIS_URL: redis://localhost:6379

          # Google variables
          TEST_GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.TEST_GOOGLE_OAUTH_CLIENT_ID }}
          TEST_GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.TEST_GOOGLE_OAUTH_CLIENT_SECRET }}
          TEST_GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.TEST_GOOGLE_OAUTH_REFRESH_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY }}

          # AWS secret backend variables (secret_aws test type)
          AWS_ACCESS_KEY_ID: ${{ secrets.KMS_CI_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.KMS_CI_AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.KMS_CI_AWS_REGION }}

          # Azure Key Vault secret backend variables (secret_azure test type)
          AZURE_TENANT_ID: ${{ secrets.KMS_CI_AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.KMS_CI_AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.KMS_CI_AZURE_CLIENT_SECRET }}
          AZURE_KV_NAME: ${{ secrets.KMS_CI_AZURE_KV_NAME }}
        run: |
          set -ex
          bash .github/scripts/nix.sh --variant ${{ matrix.features }} test ${{ matrix.type }}

  hsm:
    name: HSM ${{ matrix.hsm-type }} - ${{ matrix.features }}
    runs-on: ubuntu-latest
    # proteccio and crypt2pay hardware do not support concurrent connections from multiple CI runs;
    # give them fixed concurrency groups so only one job runs at a time across all PRs.
    # utimaco and softhsm2 use a per-run group so they are never blocked by other PRs.
    concurrency:
      group: ${{ matrix.hsm-type == 'proteccio' && 'hsm-proteccio' ||
        format('hsm-{0}-{1}', matrix.hsm-type, github.run_id) }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      matrix:
        hsm-type:
          - utimaco
          - proteccio
          - softhsm2
          - crypt2pay
        features: [ fips, non-fips ]
        exclude:
          # parallel connections on proteccio is not supported
          - hsm-type: proteccio
            features: fips

    steps:
      - name: Nix installation
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            connect-timeout = 15
            stalled-download-timeout = 15
            narinfo-cache-negative-ttl = 0

      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Warm Nix store
        run: |
          sed -n 's/.*url *= *"\(https:\/\/[^"]*\.tar\.gz\)".*/\1/p' default.nix | sort -u | while read -r url; do
            dest="/tmp/$(basename "$url")"
            # Build GitHub fallback URL from mirror URL
            fallback=$(echo "$url" | sed 's|https://package.cosmian.com/nixpkgs/|https://github.com/NixOS/nixpkgs/archive/|')
            echo "Downloading $(basename "$url") …"
            if ! curl --retry 3 --retry-delay 5 --retry-all-errors -fsSL -o "$dest" "$url"; then
              echo "Mirror failed, falling back to GitHub …"
              curl --retry 5 --retry-delay 10 --retry-max-time 300 --retry-all-errors -fsSL -o "$dest" "$fallback"
            fi
            echo "Injecting into Nix store …"
            nix-prefetch-url --unpack --name source "file://$dest"
            rm -f "$dest"
          done

      - name: Test
        env:
          # HSM
          PROTECCIO_IP: ${{ secrets.PROTECCIO_IP }}
          PROTECCIO_PASSWORD: ${{ secrets.PROTECCIO_PASSWORD }}
          PROTECCIO_SLOT: ${{ secrets.PROTECCIO_SLOT }}
          CRYPT2PAY_PASSWORD: ${{ secrets.CRYPT2PAY_PASSWORD }}
          # Google variables
          TEST_GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.TEST_GOOGLE_OAUTH_CLIENT_ID }}
          TEST_GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.TEST_GOOGLE_OAUTH_CLIENT_SECRET }}
          TEST_GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.TEST_GOOGLE_OAUTH_REFRESH_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY }}
          # OVPN for Crypt2Pay HSM tests
          OVPN_CONF: ${{ secrets.OVPN_CONF }}
        run: |
          bash .github/scripts/nix.sh --variant ${{ matrix.features }} test hsm ${{ matrix.hsm-type }}

  windows-2022:
    uses: ./.github/workflows/test_windows.yml
    with:
      toolchain: ${{ inputs.toolchain }}
      archive-name: windows

  cleanup:
    needs:
      - test-nix
      - hsm
      - windows-2022
    uses: Cosmian/reusable_workflows/.github/workflows/cleanup_cache.yml@develop
    secrets: inherit
