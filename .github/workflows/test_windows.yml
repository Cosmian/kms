---
name: Windows Tests

on:
  workflow_call:
    inputs:
      toolchain:
        required: true
        type: string
      archive-name:
        required: true
        type: string

jobs:
  cargo-test:
    name: ${{ inputs.archive-name }} - cargo test
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.toolchain }}
          components: rustfmt, clippy

      - name: Build static OpenSSL
        shell: pwsh
        run: |
          vcpkg install --triplet x64-windows-static
          vcpkg integrate install

      - name: Tests
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          . .\.github\scripts\windows\cargo_test.ps1
          TestProject
        env:
          # Google variables
          TEST_GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.TEST_GOOGLE_OAUTH_CLIENT_ID }}
          TEST_GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.TEST_GOOGLE_OAUTH_CLIENT_SECRET }}
          TEST_GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.TEST_GOOGLE_OAUTH_REFRESH_TOKEN }}

  test-ui:
    name: ${{ inputs.archive-name }} - UI E2E tests
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.toolchain }}
          targets: wasm32-unknown-unknown

      - uses: pnpm/action-setup@v6
        with:
          version: 10.17.1

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Build static OpenSSL
        shell: pwsh
        run: |
          vcpkg install --triplet x64-windows-static
          vcpkg integrate install

      - name: Install wasm-pack
        shell: pwsh
        run: cargo install wasm-pack --locked

      - name: Run UI E2E tests
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          .\.github\scripts\windows\test_ui.ps1

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ui-test-logs-windows
          path: |
            ${{ runner.temp }}\kms-stdout.log
            ${{ runner.temp }}\kms-stderr.log
            ui\test-results\
            ui\playwright-report\

  test-cng-ksp:
    name: ${{ inputs.archive-name }} - CNG KSP integration tests
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.toolchain }}

      - name: Build static OpenSSL
        shell: pwsh
        run: |
          vcpkg install --triplet x64-windows-static
          vcpkg integrate install

      - name: Run CNG KSP integration tests
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          .\.github\scripts\windows\test_cng_ksp.ps1

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: cng-ksp-test-logs
          path: |
            ${{ runner.temp }}\kms-cng-test-server.log
            ${{ runner.temp }}\kms-cng-test-server.log.err
