---
name: Packaging

on:
  workflow_call:
    inputs:
      toolchain:
        required: true
        type: string
        default: 1.90.0

jobs:
  windows-package:
    uses: ./.github/workflows/build_windows.yml
    with:
      toolchain: 1.90.0
      archive-name: windows

  docker:
    uses: ./.github/workflows/packaging-docker.yml
    with:
      toolchain: 1.90.0
    if: github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]' || startsWith(github.ref, 'refs/tags/')

  packages:
    name: ${{ matrix.runner }}-${{ matrix.features }}-${{ matrix.link }}
    runs-on: ${{ matrix.runner }}
    if: github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]' || startsWith(github.ref, 'refs/tags/')

    strategy:
      fail-fast: false
      matrix:
        features: [fips, non-fips]
        link: [static, dynamic]
        runner: [ubuntu-24.04, ubuntu-24.04-arm, macos-15]

    steps:
      - name: Nix installation
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            connect-timeout = 15
            stalled-download-timeout = 15
            narinfo-cache-negative-ttl = 0

      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Warm Nix store
        run: |
          sed -n 's/.*url *= *"\(https:\/\/[^"]*\.tar\.gz\)".*/\1/p' default.nix | sort -u | while read -r url; do
            dest="/tmp/$(basename "$url")"
            echo "Downloading $url with curl …"
            curl --retry 5 --retry-delay 5 --retry-all-errors -fsSL -o "$dest" "$url"
            echo "Injecting into Nix store …"
            nix-prefetch-url --unpack --name source "file://$dest"
            rm -f "$dest"
          done

      - name: Set up GPG
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.GPG_SIGNING_KEY }}
          passphrase: ${{ secrets.GPG_SIGNING_KEY_PASSPHRASE }}

      - name: List keys
        run: gpg -K

      - name: Package with GPG signature
        run: |
          bash .github/scripts/nix.sh --variant ${{ matrix.features }} --link ${{ matrix.link }} package
        env:
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
          GPG_SIGNING_KEY_PASSPHRASE: ${{ secrets.GPG_SIGNING_KEY_PASSPHRASE }}

      - name: Upload package
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.features }}_${{ matrix.link }}_${{ matrix.runner }}-release
          path: result-*-${{ matrix.features }}-${{ matrix.link }}/*
          retention-days: 1
          if-no-files-found: error

  publish-release:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]' || startsWith(github.ref, 'refs/tags/')

    name: Publish ${{ matrix.runner }}-${{ matrix.features }}-${{ matrix.link }}
    needs: packages
    concurrency:
      group: publish-release
      cancel-in-progress: false
    runs-on: [self-hosted, not-sgx]
    container:
      image: cosmian/docker_doc_ci
      volumes:
        - /home/cosmian/.ssh/id_rsa:/root/.ssh/id_rsa

    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        features: [fips, non-fips]
        link: [static, dynamic]
        runner: [ubuntu-24.04, ubuntu-24.04-arm, macos-15]
        package-type: [deb, rpm, dmg]
        cpu-arch: [amd64, arm64]
        exclude:
          - runner: ubuntu-24.04
            package-type: dmg
          - runner: ubuntu-24.04-arm
            package-type: dmg
          - runner: macos-15
            package-type: deb
          - runner: macos-15
            package-type: rpm
          - runner: ubuntu-24.04
            cpu-arch: arm64
          - runner: ubuntu-24.04-arm
            cpu-arch: amd64
          - runner: macos-15
            cpu-arch: amd64
    steps:
      - name: Remove existing old artifacts
        run: rm -rf ${{ matrix.features }}_${{ matrix.link }}_${{ matrix.runner }}-release

      - name: Checkout repository (for public key file)
        uses: actions/checkout@v6
        with:
          submodules: false

      - name: Download packaged artifact for this matrix
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.features }}_${{ matrix.link }}_${{ matrix.runner }}-release

      - name: List downloaded assets
        run: |
          set -ex
          ls -la
          find . -type f -print

      - name: Push to package.cosmian.com (self-hosted)
        shell: bash
        run: |
          set -ex
          if [[ "${GITHUB_REF}" =~ 'refs/tags/' ]]; then
            BRANCH="${GITHUB_REF_NAME}"
          else
            BRANCH="last_build/${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}"
          fi
          DESTINATION_DIR=/mnt/package/kms/$BRANCH
          ssh -o 'StrictHostKeyChecking no' -i /root/.ssh/id_rsa cosmian@package.cosmian.com mkdir -p "$DESTINATION_DIR"

          # Upload artifacts from the known result directory
          RESULT_DIR="result-${{ matrix.package-type }}-${{ matrix.features }}-${{ matrix.link }}"
          RESULT_SERVER_DIR="result-server-${{ matrix.features }}-${{ matrix.link }}/bin"

          # Create remote directory
          remote_dir="${DESTINATION_DIR}/${{ matrix.package-type }}/${{ matrix.cpu-arch }}/${{ matrix.features }}/${{ matrix.link }}"
          ssh -o 'StrictHostKeyChecking no' -i /root/.ssh/id_rsa cosmian@package.cosmian.com mkdir -p "$remote_dir"

          # If Linux runner
          if [[ "${{ matrix.runner }}" == ubuntu* ]]; then
            BINARY_PATTERN=linux
          else
            BINARY_PATTERN=darwin
          fi

          # If rpm package, adjust binary pattern
          if [[ "${{ matrix.package-type }}" == "rpm" ]]; then
            # if ubuntu arm64 runner
            if [[ "${{ matrix.runner }}" == "ubuntu-24.04-arm" ]]; then
              PACKAGE_PATTERN="aarch64"
            else
              PACKAGE_PATTERN="x86_64"
            fi
          else
            PACKAGE_PATTERN="${{ matrix.cpu-arch }}"
          fi

          # Upload package files (installer packages + server binary)
          scp -o 'StrictHostKeyChecking no' -i /root/.ssh/id_rsa \
            ./nix/signing-keys/cosmian-kms-public.asc \
            $RESULT_DIR/*${PACKAGE_PATTERN}*${{ matrix.package-type }}* \
            $RESULT_SERVER_DIR/*${BINARY_PATTERN}* \
            cosmian@package.cosmian.com:${remote_dir}/

          # Upload CLI binary and PKCS#11 library (mirrors the server binary upload above)
          RESULT_CLI_BIN_DIR="result-cli-${{ matrix.features }}-${{ matrix.link }}/bin"
          RESULT_CLI_LIB_DIR="result-cli-${{ matrix.features }}-${{ matrix.link }}/lib"
          if [ -d "${RESULT_CLI_BIN_DIR}" ] && [ -n "$(ls -A "${RESULT_CLI_BIN_DIR}" 2>/dev/null)" ]; then
            scp -o 'StrictHostKeyChecking no' -i /root/.ssh/id_rsa \
              "${RESULT_CLI_BIN_DIR}/"* \
              cosmian@package.cosmian.com:${remote_dir}/
          fi
          if [ -d "${RESULT_CLI_LIB_DIR}" ] && [ -n "$(ls -A "${RESULT_CLI_LIB_DIR}" 2>/dev/null)" ]; then
            scp -o 'StrictHostKeyChecking no' -i /root/.ssh/id_rsa \
              "${RESULT_CLI_LIB_DIR}/"* \
              cosmian@package.cosmian.com:${remote_dir}/
          fi

      - name: Publish GitHub Release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            result-${{ matrix.package-type }}-${{ matrix.features }}-${{ matrix.link }}/cosmian-kms-server*
            result-${{ matrix.package-type }}-${{ matrix.features }}-${{ matrix.link }}/cosmian-kms-cli*
            result-server-${{ matrix.features }}-${{ matrix.link }}/bin/cosmian-kms-server*
            result-cli-${{ matrix.features }}-${{ matrix.link }}/bin/ckms*
            result-cli-${{ matrix.features }}-${{ matrix.link }}/lib/libcosmian_pkcs11*
            ./nix/signing-keys/cosmian-kms-public.asc

  tests:
    needs: packages
    uses: ./.github/workflows/packaging-tests.yml
    with:
      toolchain: 1.90.0
