---
name: Benchmark Regression

on:
  # Run on demand from the GitHub UI (useful for one-off checks)
  workflow_dispatch:
    inputs:
      bench_speed:
        description: Benchmark speed mode (sanity|quick|normal)
        required: false
        default: quick
      regression_threshold:
        description: Maximum average regression in % before failing
        required: false
        default: '10'
      variant:
        description: Build variant (fips|non-fips)
        required: false
        default: non-fips

  # Run weekly on Sunday at 02:00 UTC against the default branch
  schedule:
    - cron: 0 2 * * 0

  # Run on tag pushes to record a release baseline
  push:
    tags:
      - '**'

jobs:
  benchmark-regression:
    name: Benchmark Regression – ${{ inputs.variant || 'non-fips' }}
    # Benchmarks require a stable, dedicated machine to produce comparable results.
    # See https://github.com/Cosmian/kms/issues/776
    runs-on: self-hosted
    timeout-minutes: 120

    steps:
      - name: Clean workspace (fix self-hosted runner permission issues)
        run: sudo chown -R "$USER:$USER" "$GITHUB_WORKSPACE" || true

      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Install dependencies (jq, bc, OpenSSL)
        run: |
          if command -v apt-get >/dev/null 2>&1; then
            sudo apt-get update -qq && sudo apt-get install -y -qq jq bc curl pkg-config libssl-dev
          elif command -v brew >/dev/null 2>&1; then
            brew install jq bc openssl pkg-config
          fi

      - name: Run benchmark regression analysis
        env:
          VARIANT: ${{ inputs.variant || 'non-fips' }}
          BENCH_SPEED: ${{ inputs.bench_speed || 'quick' }}
          REGRESSION_THRESHOLD: ${{ inputs.regression_threshold || '10' }}
        run: |
          bash .github/scripts/benchmarks/benchmark_regression.sh \
            --variant "$VARIANT"

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results-${{ inputs.variant || 'non-fips' }}-${{ github.run_id }}
          path: |
            target/criterion/benchmarks.json
          retention-days: 90

  publish-benchmarks:
    name: Publish benchmark results to package.cosmian.com
    needs: benchmark-regression
    if: always() && needs.benchmark-regression.result != 'cancelled'
    runs-on: [self-hosted, not-sgx]
    container:
      image: cosmian/docker_doc_ci
      volumes:
        - /home/cosmian/.ssh/id_rsa:/root/.ssh/id_rsa

    steps:
      - name: Download benchmark artifact
        uses: actions/download-artifact@v8
        with:
          name: benchmark-results-${{ inputs.variant || 'non-fips' }}-${{ github.run_id }}
          path: benchmark-results

      - name: Push benchmark results to package.cosmian.com
        shell: bash
        run: |
          set -ex
          if [[ "${GITHUB_REF}" =~ 'refs/tags/' ]]; then
            BRANCH="${GITHUB_REF_NAME}"
          else
            BRANCH="last_build/${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}"
          fi
          REMOTE_DIR="/mnt/package/kms/${BRANCH}/benchmarks"
          ssh -o 'StrictHostKeyChecking no' -i /root/.ssh/id_rsa \
            cosmian@package.cosmian.com mkdir -p "${REMOTE_DIR}"
          scp -o 'StrictHostKeyChecking no' -i /root/.ssh/id_rsa \
            benchmark-results/benchmarks.json \
            cosmian@package.cosmian.com:"${REMOTE_DIR}/"
