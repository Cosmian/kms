---
rules:
  # ── Hardcoded credentials and tokens ──────────────────────────────────────

  - id: cosmian-hardcoded-password-string
    patterns:
      - pattern: |
          let $VAR: &str = "$VALUE";
      - pattern: |
          let $VAR = "$VALUE".to_string();
    pattern-where-python: |
      any(kw in vars["VAR"].lower() for kw in
          ["password", "passwd", "pwd", "secret", "token", "api_key", "apikey", "credential"])
      and len(vars.get("VALUE", "")) > 4
    message: >
      Possible hardcoded credential in variable '$VAR'. Store secrets in environment
      variables or a secrets manager — never in source code.
    languages: [rust]
    severity: ERROR
    metadata:
      cwe: CWE-798
      owasp: A07:2021
      nist: SSDF PW.1.1

  - id: cosmian-hardcoded-hex-key
    # Detects hex-literal byte arrays of ≥ 16 bytes that look like keys/IVs
    pattern-regex: \b(key|secret|token|iv|nonce|seed)\s*[:=]\s*(b"[0-9a-fA-F]{32,}"|&\[0x[0-9a-fA-F]{2}(?:,\s*0x[0-9a-fA-F]{2}){15,}\])
    message: >
      Hardcoded key/secret material detected. Cryptographic keys must never appear
      as literals in source code. Load keys from a secure key store or HSM.
    languages: [rust]
    severity: ERROR
    metadata:
      cwe: CWE-321
      owasp: A02:2021

  # ── Logging sensitive data ──────────────────────────────────────────────────

  - id: cosmian-logging-secret
    patterns:
      - pattern: |
          debug!($FMT, ..., $SECRET, ...)
      - pattern: |
          info!($FMT, ..., $SECRET, ...)
      - pattern: |
          println!($FMT, ..., $SECRET, ...)
    pattern-where-python: |
      any(kw in vars.get("SECRET", "").lower() for kw in
          ["password", "passwd", "token", "secret", "key", "credential", "private"])
    message: >
      Possible sensitive value '$SECRET' passed to a log macro. Redact or mask
      secrets before logging (e.g. replace with "****").
    languages: [rust]
    severity: WARNING
    metadata:
      cwe: CWE-532
      owasp: A09:2021
      nist: SSDF PW.7.2

  - id: cosmian-display-password-field
    patterns:
      - pattern: |
          write!($F, $FMT, ..., self.$FIELD, ...)
    pattern-where-python: |
      any(kw in vars.get("FIELD", "").lower() for kw in
          ["password", "passwd", "pwd", "secret", "token", "key", "credential"])
    message: >
      Field 'self.$FIELD' written to a formatter. If this is a Display/Debug impl,
      replace the value with "****" to prevent credential leakage in logs.
    languages: [rust]
    severity: WARNING
    metadata:
      cwe: CWE-532
      owasp: A09:2021

  # ── TLS / certificate misuse ────────────────────────────────────────────────

  - id: cosmian-tls-accept-invalid-certs
    patterns:
      - pattern: |
          .danger_accept_invalid_certs(true)
      - pattern: |
          .danger_accept_invalid_hostnames(true)
      - pattern: |
          TlsConnector::builder()...accept_invalid_certs(true)
    message: >
      TLS certificate/hostname validation is disabled. This allows MITM attacks.
      Only acceptable in tests behind a feature flag (e.g. #[cfg(feature = "insecure")]).
    languages: [rust]
    severity: ERROR
    metadata:
      cwe: CWE-295
      owasp: A02:2021

  - id: cosmian-insecure-feature-in-prod-path
    patterns:
      - pattern: |
          #[cfg(not(feature = "insecure"))]
    pattern-not: |
      #[cfg(any(test, feature = "insecure"))]
    message: >
      Review use of the 'insecure' feature guard. Ensure that insecure code paths
      (disabled cert validation, skipped token expiry) cannot be compiled into
      production binaries without the explicit feature flag.
    languages: [rust]
    severity: INFO
    metadata:
      owasp: A02:2021
